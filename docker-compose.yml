version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MARKET_GENERATOR_ENABLED=true
      - TRADING_BOTS_ENABLED=true
      - ML_SERVING_URL=http://ml-serving:8090
    networks:
      - exchange-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - exchange-network
    environment:
      - VITE_BACKEND_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080
    restart: unless-stopped

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - exchange-network
    environment:
      - BACKEND_URL=http://backend:8080
    restart: unless-stopped

  # AlphaForge MLOps — model serving + monitoring + auto-retrain (C++ inference)
  ml-serving:
    build:
      context: .
      dockerfile: ml/Dockerfile
    image: alphaforge-ml
    ports:
      - "8090:8090"
    depends_on:
      - backend
    networks:
      - exchange-network
    environment:
      - BACKEND_URL=http://backend:8080
      - ALPHAFORGE_HORIZON=30
      - ALPHAFORGE_AUTO_RETRAIN=true
      - ALPHAFORGE_RETRAIN_INTERVAL=600
    volumes:
      - ml-data:/app/ml/.data
    restart: unless-stopped

  # Feature-store ingest — polls the backend REST API into the feature store
  ml-ingest:
    image: alphaforge-ml
    depends_on:
      - backend
      - ml-serving
    networks:
      - exchange-network
    environment:
      - BACKEND_URL=http://backend:8080
    volumes:
      - ml-data:/app/ml/.data
    command: ["python", "-m", "ml.ingest.poller"]
    restart: unless-stopped

networks:
  exchange-network:
    driver: bridge

volumes:
  ml-data:
