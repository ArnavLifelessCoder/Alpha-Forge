version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MARKET_GENERATOR_ENABLED=true
      - TRADING_BOTS_ENABLED=true
    networks:
      - synthetic-bull-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - synthetic-bull-network
    environment:
      - VITE_BACKEND_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080

networks:
  synthetic-bull-network:
    driver: bridge
